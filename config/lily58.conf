# --- Display ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_LV_Z_MEM_POOL_SIZE=8192

# --- nice!view (оставь ИЛИ убери если делаешь кастом UI) ---
CONFIG_NICE_VIEW_WIDGET_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# --- Bluetooth ---
# отключи если не нужны проблемы с батареей
# CONFIG_BT_CTLR_TX_PWR_PLUS_8 is not set
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERAL=y

# --- Power ---
CONFIG_ZMK_SLEEP=y

# --- Device ---
CONFIG_ZMK_KEYBOARD_NAME="Silakka54"

# --- ZMK Studio ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
